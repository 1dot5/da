name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - run: pnpm install

      - name: Verify aliases match repo symlinks
        run: pnpm run verify:aliases

      - name: Verify package contents
        run: |
          set -euo pipefail
          pnpm pack --pack-destination /tmp/pkg
          tgz=$(ls /tmp/pkg/*.tgz | head -n 1)
          echo "Package: $tgz"
          tar -tzf "$tgz"

      - name: Smoke test CLI from packed tarball
        run: |
          set -euo pipefail
          mkdir -p /tmp/pkg-extract
          tgz=$(ls /tmp/pkg/*.tgz | head -n 1)
          tar -xzf "$tgz" -C /tmp/pkg-extract
          node /tmp/pkg-extract/package/bin/cli.js /tmp/da-dest
          test -f /tmp/da-dest/AGENTS.md
          test -f /tmp/da-dest/.agent/review.md
          test -f /tmp/da-dest/.claude/CLAUDE.md
          test -f /tmp/da-dest/.claude/skills/ui-designer/SKILL.md
          # Re-running must be idempotent (exit 0, no writes).
          node /tmp/pkg-extract/package/bin/cli.js /tmp/da-dest

  release-please:
    needs: ci
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: [ci, release-please]
    if: ${{ github.event_name == 'push' && needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@1dot5/design-assistant
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: pnpm install

      - run: pnpm publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
